---

name: Test

env:
  curl_options: '-f -O -L --connect-timeout 15 -m 900 --retry 15 --retry-delay 10 --retry-max-time 300 --retry-all-errors'
  cmake_loglevel: 'DEBUG'
  make_jobs: '4'

on:
  push:

jobs:
  test:
    name: Test
    runs-on: macos-14
    steps:

      - name: Set arch
        shell: bash
        run: echo "arch=$(uname -m)" >> $GITHUB_ENV

      - name: Set buildtype
        shell: bash
        run: echo "buildtype=debug" >> $GITHUB_ENV

      - name: Set prefix path
        shell: bash
        run: echo "prefix_path=${GITHUB_WORKSPACE}/strawberry_macos_${{env.arch}}_${{env.buildtype}}" >> $GITHUB_ENV

      - name: Create directories
        shell: bash
        run: mkdir -p ${{env.prefix_path}}/{bin,lib,include}

      - name: Update PATH
        shell: bash
        run: echo "${{env.prefix_path}}/bin" >> $GITHUB_PATH

      - name: Create downloads directory
        shell: bash
        run: mkdir downloads

      - name: Create build directory
        shell: bash
        run: mkdir build

      - name: Download rapidjson
        shell: bash
        working-directory: build
        run: git clone --depth 1 --recurse-submodules https://github.com/Tencent/rapidjson

      - name: Configure rapidjson
        shell: bash
        env:
          PKG_CONFIG_EXECUTABLE: ${{env.prefix_path}}/bin/pkgconf
          PKG_CONFIG_PATH: ${{env.prefix_path}}/lib/pkgconfig
          CFLAGS: -Wno-shadow -Wno-zero-as-null-pointer-constant -Wno-deprecated-declarations -Wno-suggest-override -Wno-suggest-destructor-override -Wno-deprecated-copy-with-user-provided-copy -Wno-sign-conversion -I${{env.prefix_path}}/include
          CXXFLAGS: -Wno-shadow -Wno-zero-as-null-pointer-constant -Wno-deprecated-declarations -Wno-suggest-override -Wno-suggest-destructor-override -Wno-deprecated-copy-with-user-provided-copy -Wno-sign-conversion -Wno-deprecated-copy -I${{env.prefix_path}}/include
          LDFLAGS: -L${{env.prefix_path}}/lib -Wl,-rpath,${{env.prefix_path}}/lib
        working-directory: build/rapidjson
        run: cmake --log-level="${{env.cmake_loglevel}}" -S . -B build -G "Unix Makefiles" -DCMAKE_BUILD_TYPE="${{env.cmake_buildtype}}" -DCMAKE_INSTALL_PREFIX="${{env.prefix_path}}" -DBUILD_TESTING=OFF -DRAPIDJSON_BUILD_TESTS=OFF -DRAPIDJSON_BUILD_EXAMPLES=OFF -DRAPIDJSON_BUILD_DOC=OFF

      - name: Build rapidjson
        shell: bash
        working-directory: build/rapidjson/build
        run: cmake --build .

      - name: Install rapidjson
        shell: bash
        working-directory: build/rapidjson/build
        run: cmake --install .
